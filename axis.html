<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AXIS — 自分を知る4つの診断</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;
  --surface:#13131a;
  --surface2:#1e1e2e;
  --text:#e2e8f0;
  --muted:#64748b;
  --rose:#f43f5e;
  --rose-dark:#be123c;
  --violet:#7c3aed;
  --violet-dark:#4c1d95;
  --blue:#2563eb;
  --blue-dark:#1e40af;
  --emerald:#10b981;
  --emerald-dark:#059669;
}
body{background:var(--bg);color:var(--text);font-family:'Hiragino Sans','Yu Gothic',sans-serif;min-height:100vh;overflow-x:hidden}

/* ── SCREEN SYSTEM ── */
.screen{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:flex-start;padding:2rem 1rem}
.screen.active{display:flex}

/* ── HOME ── */
#home-screen{justify-content:center;padding:3rem 1.5rem}
.home-title{text-align:center;margin-bottom:3.5rem}
.home-title h1{font-size:2.8rem;font-weight:900;letter-spacing:.15em;background:linear-gradient(135deg,#f43f5e,#7c3aed,#2563eb,#10b981);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.home-title p{color:var(--muted);margin-top:.6rem;font-size:.95rem;letter-spacing:.05em}
.quiz-cards{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;width:100%;max-width:480px}
.quiz-card{background:var(--surface);border-radius:1.2rem;padding:1.8rem 1.4rem;cursor:pointer;transition:.25s;border:1px solid #1e1e2e;display:flex;flex-direction:column;gap:.7rem}
.quiz-card:hover{transform:translateY(-3px);filter:brightness(1.15)}
.card-icon{font-size:2rem}
.card-label{font-size:.7rem;letter-spacing:.1em;font-weight:700;text-transform:uppercase}
.card-title{font-size:1.05rem;font-weight:800;line-height:1.3}
.card-desc{font-size:.78rem;color:var(--muted);line-height:1.6}
.card-love{border-top:3px solid var(--rose)}
.card-love .card-label{color:var(--rose)}
.card-true{border-top:3px solid var(--violet)}
.card-true .card-label{color:var(--violet)}
.card-rel{border-top:3px solid var(--blue)}
.card-rel .card-label{color:var(--blue)}
.card-think{border-top:3px solid var(--emerald)}
.card-think .card-label{color:var(--emerald)}

/* ── SHARED QUIZ CHROME ── */
.q-wrap{width:100%;max-width:520px;margin:0 auto}
.q-back{background:none;border:none;color:var(--muted);font-size:.85rem;cursor:pointer;padding:.4rem .2rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:.3rem}
.q-back:hover{color:var(--text)}
.q-header{margin-bottom:2rem;text-align:center}
.q-header-icon{font-size:1.8rem;margin-bottom:.5rem}
.q-header h2{font-size:1.3rem;font-weight:900;letter-spacing:.05em}
.q-progress{display:flex;gap:4px;margin-top:1rem;justify-content:center;flex-wrap:wrap}
.q-dot{width:8px;height:8px;border-radius:50%;background:var(--surface2);transition:.3s}
.q-dot.done{opacity:1}
.q-num{font-size:.75rem;color:var(--muted);margin-top:.8rem}
.q-text{font-size:1.15rem;font-weight:700;text-align:center;line-height:1.7;margin-bottom:2rem}
.q-options{display:flex;flex-direction:column;gap:.85rem}
.q-opt{background:var(--surface);border:1.5px solid var(--surface2);border-radius:.9rem;padding:1.1rem 1.4rem;cursor:pointer;font-size:.95rem;text-align:left;color:var(--text);transition:.2s;line-height:1.5}
.q-opt:hover{border-color:var(--accent,#888);background:var(--surface2)}
.q-opt:active{transform:scale(.98)}

/* ── LOADING ── */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:1.5rem}
.loading-ring{width:64px;height:64px;border-radius:50%;border:4px solid var(--surface2);border-top-color:var(--accent,#888);animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{color:var(--muted);font-size:.95rem;letter-spacing:.1em}

/* ── RESULT ── */
.result-wrap{width:100%;max-width:520px;margin:0 auto;padding-bottom:3rem}
.result-back{background:none;border:none;color:var(--muted);font-size:.85rem;cursor:pointer;padding:.4rem .2rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:.3rem}
.result-back:hover{color:var(--text)}
.result-badge{text-align:center;padding:1rem;border-radius:1.5rem;margin-bottom:1.5rem}
.result-badge-icon{font-size:4rem;margin-bottom:.5rem}
.result-badge-type{font-size:.75rem;letter-spacing:.15em;font-weight:700;margin-bottom:.3rem}
.result-badge-name{font-size:1.7rem;font-weight:900}
.result-badge-sub{font-size:.9rem;margin-top:.4rem;opacity:.8}
.result-section{background:var(--surface);border-radius:1rem;padding:1.4rem;margin-bottom:1rem}
.result-section h3{font-size:.8rem;letter-spacing:.12em;font-weight:700;margin-bottom:.8rem;text-transform:uppercase}
.result-section p{font-size:.93rem;line-height:1.75;color:#cbd5e1}
.result-tags{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.8rem}
.result-tag{padding:.3rem .8rem;border-radius:999px;font-size:.78rem;font-weight:600;background:var(--surface2)}
.result-bars{display:flex;flex-direction:column;gap:.7rem;margin-top:.4rem}
.result-bar-row{display:flex;align-items:center;gap:.8rem}
.result-bar-label{font-size:.8rem;width:5rem;flex-shrink:0}
.result-bar-bg{flex:1;height:8px;border-radius:999px;background:var(--surface2);overflow:hidden}
.result-bar-fill{height:100%;border-radius:999px;background:var(--accent,#888);transition:width 1s ease}
.retry-btn{display:block;width:100%;padding:1rem;border-radius:.9rem;border:none;font-size:1rem;font-weight:800;cursor:pointer;text-align:center;margin-top:1.5rem;letter-spacing:.05em;transition:.2s}
.retry-btn:hover{filter:brightness(1.1)}
.home-btn{display:block;width:100%;padding:.9rem;border-radius:.9rem;border:1.5px solid var(--surface2);background:transparent;font-size:.9rem;color:var(--muted);cursor:pointer;text-align:center;margin-top:.8rem;transition:.2s}
.home-btn:hover{border-color:var(--muted);color:var(--text)}

/* ── ACCENT COLORS per quiz ── */
#love-screen{--accent:var(--rose)}
#trueself-screen{--accent:var(--violet)}
#relation-screen{--accent:var(--blue)}
#thinking-screen{--accent:var(--emerald)}

#love-screen .q-dot.done{background:var(--rose)}
#trueself-screen .q-dot.done{background:var(--violet)}
#relation-screen .q-dot.done{background:var(--blue)}
#thinking-screen .q-dot.done{background:var(--emerald)}

#love-screen .retry-btn{background:var(--rose);color:#fff}
#trueself-screen .retry-btn{background:var(--violet);color:#fff}
#relation-screen .retry-btn{background:var(--blue);color:#fff}
#thinking-screen .retry-btn{background:var(--emerald);color:#fff}

/* result badge tints */
.badge-rose{background:linear-gradient(135deg,#4c0519,#881337)}
.badge-violet{background:linear-gradient(135deg,#2e1065,#4c1d95)}
.badge-blue{background:linear-gradient(135deg,#1e3a8a,#1e40af)}
.badge-emerald{background:linear-gradient(135deg,#022c22,#065f46)}
</style>
</head>

<script>
// ═══ NAVIGATION ═══
function openQuiz(type){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(type+'-screen').classList.add('active');
  startQuiz(type);
}
function goHome(){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('home-screen').classList.add('active');
}

// ═══ SHARED ENGINE ═══
const qState = {};

function startQuiz(type){
  const cfg = QUIZZES[type];
  qState[type] = { answers: [], idx: 0 };
  showSection(type,'q');
  renderQuestion(type);
}

function showSection(type, sec){
  ['q','loading','result'].forEach(s=>{
    document.getElementById(type+'-'+s).style.display = (s===sec)?'':'none';
  });
}

function renderQuestion(type){
  const cfg = QUIZZES[type];
  const st  = qState[type];
  const q   = cfg.questions[st.idx];
  const total = cfg.questions.length;

  // dots
  const dotsEl = document.getElementById(type+'-dots');
  dotsEl.innerHTML = '';
  for(let i=0;i<total;i++){
    const d=document.createElement('span');
    d.className='q-dot'+(i<st.idx?' done':'');
    dotsEl.appendChild(d);
  }
  document.getElementById(type+'-num').textContent = `Q${st.idx+1} / ${total}`;
  document.getElementById(type+'-qtext').textContent = q.text;

  const optsEl = document.getElementById(type+'-opts');
  optsEl.innerHTML='';
  q.options.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='q-opt';
    btn.textContent=opt.text;
    btn.onclick=()=>answerQ(type,opt.value);
    optsEl.appendChild(btn);
  });
}

function answerQ(type, value){
  const st  = qState[type];
  const cfg = QUIZZES[type];
  st.answers.push(value);
  st.idx++;
  if(st.idx >= cfg.questions.length){
    showSection(type,'loading');
    setTimeout(()=>showResult(type), 2000);
  } else {
    renderQuestion(type);
  }
}

function showResult(type){
  const cfg = QUIZZES[type];
  const st  = qState[type];
  const typeKey = cfg.calcType(st.answers);
  const res = cfg.types[typeKey];
  const badge = cfg.badge;

  let html = `
    <div class="result-badge ${badge}">
      <div class="result-badge-icon">${res.icon}</div>
      <div class="result-badge-type">${res.key}</div>
      <div class="result-badge-name">${res.name}</div>
      <div class="result-badge-sub">${res.sub}</div>
    </div>
    <div class="result-section">
      <h3>あなたの本質</h3>
      <p>${res.desc}</p>
    </div>
    <div class="result-section">
      <h3>キーワード</h3>
      <div class="result-tags">${res.tags.map(t=>`<span class="result-tag">${t}</span>`).join('')}</div>
    </div>
    <div class="result-section">
      <h3>強み</h3>
      <p>${res.strength}</p>
    </div>
    <div class="result-section">
      <h3>注意点</h3>
      <p>${res.caution}</p>
    </div>
  `;
  if(res.compat){
    html+=`<div class="result-section"><h3>相性がいいタイプ</h3><p>${res.compat}</p></div>`;
  }

  document.getElementById(type+'-result-content').innerHTML = html;
  showSection(type,'result');
}

// ═══ QUIZ 1: 恋愛タイプ ═══

function thinkCalc(answers){
  let N=0,L=0,A=0,R=0;
  answers.forEach(a=>{
    if(a==='N')N++;
    else if(a==='L')L++;
    else if(a==='A')A++;
    else R++;
  });
  const axis1 = N>=L ? 'N' : 'L';
  const axis2 = A>=R ? 'A' : 'R';
  return axis1+axis2;
}
