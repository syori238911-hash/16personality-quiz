<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>16パーソナリティ診断</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: linear-gradient(135deg, #0D1B2A 0%, #1B2A4A 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    background: white;
    border-radius: 24px;
    padding: 40px;
    max-width: 640px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }

  /* タイトル画面 */
  .screen { display: none; }
  .screen.active { display: block; }

  .title-screen { text-align: center; }
  .title-screen h1 {
    font-size: 2rem;
    color: #0D1B2A;
    margin-bottom: 8px;
  }
  .title-screen h1 span { color: #00C9C8; }
  .title-screen p {
    color: #666;
    margin-bottom: 32px;
    line-height: 1.7;
  }
  .badge {
    display: inline-block;
    background: #E8F4F8;
    color: #0089A7;
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: bold;
    margin-bottom: 20px;
  }
  .axis-list {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 32px;
  }
  .axis-item {
    background: #F0F6FA;
    border-radius: 12px;
    padding: 14px;
    text-align: left;
  }
  .axis-item .label {
    font-size: 0.75rem;
    color: #888;
    margin-bottom: 4px;
  }
  .axis-item .value {
    font-size: 0.95rem;
    font-weight: bold;
    color: #1A2940;
  }

  /* ボタン */
  .btn {
    background: linear-gradient(135deg, #00C9C8, #0089A7);
    color: white;
    border: none;
    padding: 16px 40px;
    border-radius: 50px;
    font-size: 1.1rem;
    font-weight: bold;
    cursor: pointer;
    width: 100%;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0,201,200,0.4);
  }
  .btn:active { transform: translateY(0); }

  /* 進捗バー */
  .progress-wrap {
    margin-bottom: 28px;
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
    font-size: 0.85rem;
    color: #888;
  }
  .progress-bar {
    background: #E8F4F8;
    border-radius: 10px;
    height: 8px;
    overflow: hidden;
  }
  .progress-fill {
    background: linear-gradient(90deg, #00C9C8, #0089A7);
    height: 100%;
    border-radius: 10px;
    transition: width 0.4s ease;
  }

  /* 質問 */
  .question-screen h2 {
    font-size: 1.25rem;
    color: #1A2940;
    line-height: 1.6;
    margin-bottom: 28px;
    min-height: 80px;
  }
  .axis-tag {
    display: inline-block;
    padding: 3px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: bold;
    margin-bottom: 12px;
  }
  .choices {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .choice-btn {
    background: #F8FBFC;
    border: 2px solid #E0EAF0;
    border-radius: 14px;
    padding: 16px 20px;
    font-size: 1rem;
    color: #1A2940;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    line-height: 1.5;
  }
  .choice-btn:hover {
    border-color: #00C9C8;
    background: #E8F4F8;
    transform: translateX(4px);
  }
  .choice-btn.selected {
    border-color: #00C9C8;
    background: #E8F4F8;
  }

  /* 5段階スケール */
  .scale-wrap {
    margin-top: 8px;
  }
  .scale-labels {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    color: #888;
    margin-bottom: 10px;
  }
  .scale-btns {
    display: flex;
    gap: 8px;
    justify-content: center;
  }
  .scale-btn {
    flex: 1;
    padding: 14px 8px;
    border: 2px solid #E0EAF0;
    border-radius: 12px;
    background: #F8FBFC;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: bold;
    color: #666;
    transition: all 0.2s;
  }
  .scale-btn:hover {
    border-color: #00C9C8;
    background: #E8F4F8;
    color: #0089A7;
  }
  .scale-btn.s1 { border-color: #E84A5F; }
  .scale-btn.s2 { border-color: #F0A500; }
  .scale-btn.s3 { border-color: #AAA; }
  .scale-btn.s4 { border-color: #5CB85C; }
  .scale-btn.s5 { border-color: #00C9C8; }
  .scale-btn.selected { color: white; }
  .scale-btn.s1.selected { background: #E84A5F; border-color: #E84A5F; }
  .scale-btn.s2.selected { background: #F0A500; border-color: #F0A500; }
  .scale-btn.s3.selected { background: #AAA; border-color: #AAA; }
  .scale-btn.s4.selected { background: #5CB85C; border-color: #5CB85C; }
  .scale-btn.s5.selected { background: #00C9C8; border-color: #00C9C8; }

  /* ローディング */
  .loading-screen { text-align: center; padding: 40px 0; }
  .spinner {
    width: 60px; height: 60px;
    border: 5px solid #E8F4F8;
    border-top-color: #00C9C8;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 24px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-screen p { color: #666; font-size: 1rem; }

  /* 結果画面 */
  .result-screen { text-align: center; }
  .result-type-badge {
    display: inline-block;
    font-size: 3rem;
    font-weight: 900;
    color: white;
    padding: 16px 36px;
    border-radius: 20px;
    margin-bottom: 16px;
    letter-spacing: 4px;
  }
  .result-name {
    font-size: 1.6rem;
    font-weight: bold;
    color: #1A2940;
    margin-bottom: 8px;
  }
  .result-tagline {
    color: #666;
    margin-bottom: 28px;
    font-size: 1rem;
    line-height: 1.6;
  }
  .result-axes {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 24px;
  }
  .axis-result {
    background: #F0F6FA;
    border-radius: 12px;
    padding: 12px;
  }
  .axis-result .axis-name {
    font-size: 0.75rem;
    color: #888;
    margin-bottom: 4px;
  }
  .axis-result .axis-val {
    font-size: 1rem;
    font-weight: bold;
    color: #0089A7;
  }
  .result-desc {
    background: #F0F6FA;
    border-radius: 16px;
    padding: 20px;
    text-align: left;
    margin-bottom: 20px;
    line-height: 1.7;
    color: #333;
    font-size: 0.95rem;
  }
  .strengths-wrap {
    text-align: left;
    margin-bottom: 24px;
  }
  .strengths-wrap h3 {
    font-size: 1rem;
    color: #1A2940;
    margin-bottom: 12px;
  }
  .strength-tag {
    display: inline-block;
    background: #E8F4F8;
    color: #0089A7;
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: bold;
    margin: 4px;
  }
  .career-wrap {
    text-align: left;
    margin-bottom: 28px;
  }
  .career-wrap h3 {
    font-size: 1rem;
    color: #1A2940;
    margin-bottom: 12px;
  }
  .career-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: #F8FBFC;
    border-radius: 10px;
    margin-bottom: 8px;
    font-size: 0.9rem;
    color: #1A2940;
  }
  .career-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .btn-retry {
    background: white;
    color: #0089A7;
    border: 2px solid #00C9C8;
    padding: 14px 40px;
    border-radius: 50px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    width: 100%;
    transition: all 0.2s;
  }
  .btn-retry:hover {
    background: #E8F4F8;
  }
</style>
</head>
<body>
<div class="container">

  <!-- タイトル画面 -->
  <div class="screen active" id="screen-title">
    <div class="title-screen">
      <div class="badge">✨ 無料 · 3分で完了</div>
      <h1>16<span>パーソナリティ</span><br>診断</h1>
      <p style="margin-top:12px">20の質問に答えるだけで<br>あなたの性格タイプがわかります</p>
      <div class="axis-list">
        <div class="axis-item">
          <div class="label">エネルギーの向き</div>
          <div class="value">外向型 E ↔ 内向型 I</div>
        </div>
        <div class="axis-item">
          <div class="label">情報の受け取り方</div>
          <div class="value">感覚型 S ↔ 直感型 N</div>
        </div>
        <div class="axis-item">
          <div class="label">判断の仕方</div>
          <div class="value">思考型 T ↔ 感情型 F</div>
        </div>
        <div class="axis-item">
          <div class="label">生活スタイル</div>
          <div class="value">計画型 J ↔ 探索型 P</div>
        </div>
      </div>
      <button class="btn" onclick="startQuiz()">診断スタート →</button>
    </div>
  </div>

  <!-- 質問画面 -->
  <div class="screen" id="screen-question">
    <div class="progress-wrap">
      <div class="progress-info">
        <span id="q-num">質問 1 / 20</span>
        <span id="q-pct">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>
    <div id="axis-tag-wrap"></div>
    <h2 id="question-text"></h2>
    <div class="scale-wrap">
      <div class="scale-labels">
        <span>まったく違う</span>
        <span>どちらでも</span>
        <span>とてもそう</span>
      </div>
      <div class="scale-btns">
        <button class="scale-btn s1" onclick="answer(1)">1</button>
        <button class="scale-btn s2" onclick="answer(2)">2</button>
        <button class="scale-btn s3" onclick="answer(3)">3</button>
        <button class="scale-btn s4" onclick="answer(4)">4</button>
        <button class="scale-btn s5" onclick="answer(5)">5</button>
      </div>
    </div>
  </div>

  <!-- ローディング画面 -->
  <div class="screen" id="screen-loading">
    <div class="loading-screen">
      <div class="spinner"></div>
      <p>あなたのタイプを分析中...</p>
    </div>
  </div>

  <!-- 結果画面 -->
  <div class="screen" id="screen-result">
    <div class="result-screen">
      <div id="result-badge" class="result-type-badge"></div>
      <div id="result-name" class="result-name"></div>
      <div id="result-tagline" class="result-tagline"></div>
      <div class="result-axes" id="result-axes"></div>
      <div id="result-desc" class="result-desc"></div>
      <div class="strengths-wrap">
        <h3>💪 あなたの強み</h3>
        <div id="result-strengths"></div>
      </div>
      <div class="career-wrap">
        <h3>🎯 向いている職業・働き方</h3>
        <div id="result-careers"></div>
      </div>
      <button class="btn-retry" onclick="retryQuiz()">もう一度診断する</button>
    </div>
  </div>

</div>

<script>
// 質問データ（各軸5問ずつ、計20問）
// スコア：高いほど E/N/T/J 寄り、低いほど I/S/F/P 寄り
const questions = [
  // E(高) vs I(低)
  { text: "初めて会う人とすぐに打ち解けて会話できる", axis: "EI", axisLabel: "E（外向） / I（内向）", color: "#00C9C8", dir: "E" },
  { text: "週末は友人と外出するより家でのんびりしたい", axis: "EI", axisLabel: "E（外向） / I（内向）", color: "#00C9C8", dir: "I" },
  { text: "グループの中心にいることが多い", axis: "EI", axisLabel: "E（外向） / I（内向）", color: "#00C9C8", dir: "E" },
  { text: "人と長時間一緒にいると疲れを感じる", axis: "EI", axisLabel: "E（外向） / I（内向）", color: "#00C9C8", dir: "I" },
  { text: "考えながら声に出して話すことが多い", axis: "EI", axisLabel: "E（外向） / I（内向）", color: "#00C9C8", dir: "E" },
  // S(高) vs N(低)
  { text: "細かい事実やデータよりも全体の流れや可能性に興味がある", axis: "SN", axisLabel: "S（感覚） / N（直感）", color: "#7B4F9E", dir: "N" },
  { text: "実績や経験に基づいて判断することが多い", axis: "SN", axisLabel: "S（感覚） / N（直感）", color: "#7B4F9E", dir: "S" },
  { text: "「なぜそうなるのか」という根本的な問いに興味がある", axis: "SN", axisLabel: "S（感覚） / N（直感）", color: "#7B4F9E", dir: "N" },
  { text: "アイデアより実用性・現実性を重視する", axis: "SN", axisLabel: "S（感覚） / N（直感）", color: "#7B4F9E", dir: "S" },
  { text: "将来の可能性や夢について考えることが好きだ", axis: "SN", axisLabel: "S（感覚） / N（直感）", color: "#7B4F9E", dir: "N" },
  // T(高) vs F(低)
  { text: "物事を決めるとき感情より論理・データを重視する", axis: "TF", axisLabel: "T（思考） / F（感情）", color: "#E84A5F", dir: "T" },
  { text: "友人が悩んでいるとき、解決策より共感することを優先する", axis: "TF", axisLabel: "T（思考） / F（感情）", color: "#E84A5F", dir: "F" },
  { text: "批判や厳しい意見でも、正しければ相手に伝えるべきだと思う", axis: "TF", axisLabel: "T（思考） / F（感情）", color: "#E84A5F", dir: "T" },
  { text: "他人の気持ちや感情の変化に敏感に気づく", axis: "TF", axisLabel: "T（思考） / F（感情）", color: "#E84A5F", dir: "F" },
  { text: "論争や議論は苦手ではなく、むしろ楽しめる", axis: "TF", axisLabel: "T（思考） / F（感情）", color: "#E84A5F", dir: "T" },
  // J(高) vs P(低)
  { text: "旅行や予定は事前にしっかり計画を立てたい", axis: "JP", axisLabel: "J（計画） / P（探索）", color: "#5CB85C", dir: "J" },
  { text: "締め切りギリギリまで作業を始めないことが多い", axis: "JP", axisLabel: "J（計画） / P（探索）", color: "#5CB85C", dir: "P" },
  { text: "物事を終わらせてスッキリすることが好きだ", axis: "JP", axisLabel: "J（計画） / P（探索）", color: "#5CB85C", dir: "J" },
  { text: "急な変更や予定外の出来事に柔軟に対応できる", axis: "JP", axisLabel: "J（計画） / P（探索）", color: "#5CB85C", dir: "P" },
  { text: "部屋や持ち物は整理整頓されていないと落ち着かない", axis: "JP", axisLabel: "J（計画） / P（探索）", color: "#5CB85C", dir: "J" },
];

// タイプデータ
const typeData = {
  INTJ: { name: "建築家", color: "#1B2A4A", tagline: "戦略的な思考と強い意志を持つ独創的な計画者。目標に向かって着実に動く。", desc: "INTJは16タイプの中でも最も希少で知的なタイプのひとつ。長期的なビジョンを描き、そこに向かって戦略的に動く力を持っています。感情に流されず、論理と原則に基づいて行動します。", strengths: ["戦略的思考", "独立心", "決断力", "完璧主義", "長期ビジョン"], careers: ["経営コンサルタント", "研究者・科学者", "ソフトウェアエンジニア", "起業家", "戦略アナリスト"] },
  INTP: { name: "論理学者", color: "#0089A7", tagline: "知的好奇心旺盛な理論家。あらゆる事象の「なぜ」を探求し続ける。", desc: "INTPは論理と分析を愛するタイプ。複雑な問題を深く掘り下げ、独自の理論を構築することが得意です。枠にとらわれない自由な発想と、真実を追い求める情熱が特徴。", strengths: ["論理的分析力", "創造的思考", "客観性", "独創性", "深い洞察力"], careers: ["プログラマー・エンジニア", "研究者", "哲学者・評論家", "データサイエンティスト", "ゲームデザイナー"] },
  ENTJ: { name: "指揮官", color: "#C0392B", tagline: "生まれながらのリーダー。目標を設定し、人を束ね、成果を出す。", desc: "ENTJは決断力とリーダーシップが際立つタイプ。目標に向かって組織を動かす力があり、ビジョンを実現するために周囲を巻き込みます。起業家・経営者に最も多いタイプのひとつ。", strengths: ["リーダーシップ", "決断力", "戦略思考", "向上心", "統率力"], careers: ["経営者・起業家", "マネージャー", "弁護士", "政治家", "コンサルタント"] },
  ENTP: { name: "討論者", color: "#E67E22", tagline: "アイデアと議論を愛する発明家タイプ。常識を疑い、新しい道を切り開く。", desc: "ENTPは知的な挑戦と議論を楽しむタイプ。既存の枠組みを壊して新しい視点を生み出す力があります。スタートアップや新規事業に向いており、変化を恐れない柔軟さが強み。", strengths: ["創造力", "議論力", "柔軟性", "発想力", "問題解決力"], careers: ["起業家", "マーケター", "弁護士", "クリエイティブディレクター", "コメディアン・作家"] },
  INFJ: { name: "提唱者", color: "#6C3483", tagline: "深い洞察力と強い理想を持つ、最も希少な性格タイプ。", desc: "INFJは全タイプの中で最も希少（全人口の1〜2%）。人の気持ちを深く理解しながら、社会をより良くしたいという強い理想を持ちます。静かながら強い意志と使命感を持っています。", strengths: ["深い洞察力", "共感力", "理想主義", "創造性", "忍耐力"], careers: ["カウンセラー・心理士", "作家・詩人", "社会活動家", "教師・教育者", "医師・看護師"] },
  INFP: { name: "仲介者", color: "#8E44AD", tagline: "感受性豊かな理想主義者。自分の価値観に従って静かに世界を変えようとする。", desc: "INFPは豊かな内面世界と強い価値観を持つタイプ。表面上は穏やかですが、信念に基づいた行動力を持ちます。創作活動や人の心に寄り添う仕事に向いています。", strengths: ["共感力", "創造性", "誠実さ", "適応力", "深い感受性"], careers: ["作家・ライター", "デザイナー", "カウンセラー", "社会福祉士", "アーティスト"] },

let currentQ = 0;
let scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

function startQuiz() {
  currentQ = 0;
  scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
  showScreen('question');
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  const total = questions.length;
  const pct = Math.round((currentQ / total) * 100);

  document.getElementById('q-num').textContent = `質問 ${currentQ + 1} / ${total}`;
  document.getElementById('q-pct').textContent = `${pct}%`;
  document.getElementById('progress-fill').style.width = `${pct}%`;

  const tagWrap = document.getElementById('axis-tag-wrap');
  tagWrap.innerHTML = `<span class="axis-tag" style="background:${q.color}22;color:${q.color}">${q.axisLabel}</span>`;

  document.getElementById('question-text').textContent = q.text;

  document.querySelectorAll('.scale-btn').forEach(b => b.classList.remove('selected'));
}

function answer(val) {
  document.querySelectorAll('.scale-btn').forEach((b, i) => {
    b.classList.remove('selected');
    if (i + 1 === val) b.classList.add('selected');
  });

  const q = questions[currentQ];

  // スコア加算（5段階：1=反対, 3=中立, 5=賛成）
  if (q.dir === 'E') { scores.E += val; scores.I += (6 - val); }
  else if (q.dir === 'I') { scores.I += val; scores.E += (6 - val); }
  else if (q.dir === 'S') { scores.S += val; scores.N += (6 - val); }
  else if (q.dir === 'N') { scores.N += val; scores.S += (6 - val); }
  else if (q.dir === 'T') { scores.T += val; scores.F += (6 - val); }
  else if (q.dir === 'F') { scores.F += val; scores.T += (6 - val); }
  else if (q.dir === 'J') { scores.J += val; scores.P += (6 - val); }
  else if (q.dir === 'P') { scores.P += val; scores.J += (6 - val); }

  setTimeout(() => {
    currentQ++;
    if (currentQ >= questions.length) {
      showScreen('loading');
      setTimeout(showResult, 1800);
    } else {
      renderQuestion();
    }
  }, 300);
}

function showResult() {
  const EI = scores.E >= scores.I ? 'E' : 'I';
  const SN = scores.N >= scores.S ? 'N' : 'S';
  const TF = scores.T >= scores.F ? 'T' : 'F';
  const JP = scores.J >= scores.P ? 'J' : 'P';
  const type = EI + SN + TF + JP;
  const data = typeData[type];

  document.getElementById('result-badge').textContent = type;
  document.getElementById('result-badge').style.background = data.color;
  document.getElementById('result-name').textContent = `「${data.name}」型`;
  document.getElementById('result-tagline').textContent = data.tagline;
  document.getElementById('result-desc').textContent = data.desc;

  // 軸スコア
  const totalEI = scores.E + scores.I;
  const totalSN = scores.S + scores.N;
  const totalTF = scores.T + scores.F;
  const totalJP = scores.J + scores.P;
  document.getElementById('result-axes').innerHTML = `
    <div class="axis-result"><div class="axis-name">E（外向） / I（内向）</div><div class="axis-val">${EI} (${EI==='E'?Math.round(scores.E/totalEI*100):Math.round(scores.I/totalEI*100)}%)</div></div>
    <div class="axis-result"><div class="axis-name">S（感覚） / N（直感）</div><div class="axis-val">${SN} (${SN==='S'?Math.round(scores.S/totalSN*100):Math.round(scores.N/totalSN*100)}%)</div></div>
    <div class="axis-result"><div class="axis-name">T（思考） / F（感情）</div><div class="axis-val">${TF} (${TF==='T'?Math.round(scores.T/totalTF*100):Math.round(scores.F/totalTF*100)}%)</div></div>
    <div class="axis-result"><div class="axis-name">J（計画） / P（探索）</div><div class="axis-val">${JP} (${JP==='J'?Math.round(scores.J/totalJP*100):Math.round(scores.P/totalJP*100)}%)</div></div>
  `;

  // 強み
  const colors2 = ["#00C9C8","#0089A7","#7B4F9E","#E84A5F","#5CB85C"];
  document.getElementById('result-strengths').innerHTML =
    data.strengths.map((s,i) => `<span class="strength-tag" style="background:${colors2[i]}22;color:${colors2[i]}">${s}</span>`).join('');

  // 職業
  document.getElementById('result-careers').innerHTML =
    data.careers.map((c,i) => `<div class="career-item"><div class="career-dot" style="background:${colors2[i%5]}"></div>${c}</div>`).join('');

  showScreen('result');
}

function retryQuiz() {
  startQuiz();
}
</script>
